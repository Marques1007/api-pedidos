services:

  postgres:
    image: postgres:16
    container_name: postgres-api-pedidos
    restart: always
    environment:
      POSTGRES_DB: bd-api-pedidos
      POSTGRES_USER: coti
      POSTGRES_PASSWORD: coti
    ports:
      - "5435:5432"
    volumes:
      - postgres_api_pedidos_data:/var/lib/postgresql/data
    networks:
      - api_pedidos_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-api-pedidos
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: coti@email.com
      PGADMIN_DEFAULT_PASSWORD: Coti@2026
    ports:
      - "5051:80"
    volumes:
      - pgadmin_api_pedidos_data:/var/lib/pgadmin
    networks:
      - api_pedidos_network
    depends_on:
      - postgres

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-api-pedidos
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: coti
      RABBITMQ_DEFAULT_PASS: coti
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_api_pedidos_data:/var/lib/rabbitmq
    networks:
      - api_pedidos_network

volumes:
  postgres_api_pedidos_data:
  pgadmin_api_pedidos_data:
  rabbitmq_api_pedidos_data:

networks:
  api_pedidos_network:
    driver: bridge